name: Infrastructure API CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: infra-api
  APP_DIR: python/infra-api
  APP_PORT: 5050
  DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
  

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        working-directory: ${{ env.APP_DIR }}
        run: flake8 app.py --max-line-length=100

  test:
    name: Unit & System Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest requests

      - name: Run unit tests
        run: pytest tests/unit -v

      - name: Build image for system tests
        run: docker build -t ${{ env.IMAGE_NAME }}:test .

      - name: Run container for system tests
        run: |
          docker run -d -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
            -e APP_ENV=dev -e PORT=${{ env.APP_PORT }} \
            --name test-container ${{ env.IMAGE_NAME }}:test
          sleep 3

      - name: Run system tests
        env:
          BASE_URL: http://localhost:${{ env.APP_PORT }}
        run: pytest tests/system -v

      - name: Container logs (on failure)
        if: failure()
        run: docker logs test-container

      - name: Clean up container
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

      - name: Verify registry authentication (dry run)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | head -c7)" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_DIR }}
          push: true
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.tag }}
            APP_VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev-latest
