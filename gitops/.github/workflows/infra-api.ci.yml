name: Infrastructure API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  IMAGE_NAME: infra-api

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 ./python/infra-api/app.py --max-line-length=100

  test:
    name: Unit & System Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r ./python/infra-api/requirements.txt
          pip install pytest requests

      - name: Run unit tests
        run: pytest ./gitops/tests/unit -v

      - name: Run system tests (against running container)
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:test .
          docker run -d -p 5000:5000 -e APP_ENV=dev --name test-container ${{ env.IMAGE_NAME }}:test
          sleep 3
          pytest ./gitops/tests/system -v
          docker stop test-container
          docker rm test-container

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | head -c7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.tag }}
            APP_VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev-latest
